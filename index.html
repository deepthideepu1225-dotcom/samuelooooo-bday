<!DOCTYPE html>
<html>
<head>
  <title>For My Bangaram 💖</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      padding: 40px;
      overflow:hidden;
    }

    .box { display:none; }
    .active { display:block; }

    button {
      padding: 12px 25px;
      margin: 15px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    img {
      width: 250px;
      margin-top: 20px;
    }

    /* CAKE BOUNCE */
    .bounce {
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-25px); }
    }

    /* TEXT POP */
    .pop {
      animation: pop 0.5s ease;
    }

    @keyframes pop {
      from { transform: scale(0.5); opacity:0; }
      to { transform: scale(1); opacity:1; }
    }

    /* SIMPLE CONFETTI */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background: red;
      top: -10px;
      animation: fall 3s linear infinite;
    }

    @keyframes fall {
      to { transform: translateY(100vh); }
    }

  </style>
</head>

<body>

<!-- PASSCODE -->
<div id="p1" class="active">
  <h2>Enter Passcode 💖</h2>
  <input type="password" id="pass">
  <br>
  <button onclick="check()">Unlock</button>
</div>

<!-- GIFT -->
<div id="p2" class="box">
  <h2 class="pop">🎁 Tap to Open Gift</h2>
  <button onclick="next(3)">Open 🎁</button>
</div>

<!-- CAKE -->
<div id="p3" class="box">
  <h2>🎂 Blow the Candle</h2>
  <img class="bounce" src="https://i.imgur.com/6RLQdQG.png">
  <br>
  <button onclick="blow()">Blow 🎂</button>
</div>

<!-- BDAY -->
<div id="p4" class="box">
  <h1 class="pop">🎉 Happy Birthday bangarammm ❤️❤️❤️❤️</h1>
  <p>Many more happy returns of the day 🎂</p>
</div>

<!-- LETTER -->
<div id="p5" class="box">
  <button onclick="next(6)">Open Letter 💌</button>
</div>

<!-- CHOOSE -->
<div id="p6" class="box">
  <h2>🎁 Choose One Gift</h2>
  <button onclick="next(7)">Gift 1</button>
  <button onclick="next(8)">Gift 2</button>
  <button onclick="next(9)">Gift 3</button>
</div>

<!-- LETTER 1 -->
<div id="p7" class="box">
  <p>Many more happy returns of the day bangaram ❤️</p>
</div>

<!-- LETTER 2 -->
<div id="p8" class="box">
  <p>Love you bangaram ❤️</p>
</div>

<!-- PROPOSAL -->
<div id="p9" class="box">
  <h2>Will you marry me?</h2>
  <input id="ans">
  <button onclick="final()">Submit</button>
</div>

<!-- FINAL -->
<div id="p10" class="box">
  <h1>🎉 Hurrayyy 🎉</h1>
</div>

<script>
function check(){
  let p=document.getElementById("pass").value;
  if(p==="2307"){show("p2")}
  else{alert("Wrong passcode")}
}

function next(n){show("p"+n)}

function blow(){
  show("p4");
  createConfetti();
}

function final(){
  let a=document.getElementById("ans").value.toLowerCase();
  if(a==="yes"){
    show("p10");
    createConfetti();
  }
}

function show(id){
  let pages=document.querySelectorAll(".box, .active");
  pages.forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function createConfetti(){
  for(let i=0;i<30;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(c);
  }
}
</script>

</body>
</html>
